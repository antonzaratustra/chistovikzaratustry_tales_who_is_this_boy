<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Притча о мальчике</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Courier New', monospace;
        }
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        #start-screen {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 1000;
            transition: opacity 1s;
        }
        #start-label {
            color: rgba(255,255,255,0.4);
            font-size: 13px;
            letter-spacing: 6px;
            text-transform: uppercase;
        }
        #fade-overlay {
            position: fixed;
            inset: 0;
            background: #000;
            pointer-events: none;
            opacity: 0;
            z-index: 2000;
        }
        #loader {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.2);
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        #subtitle-container {
            position: fixed;
            bottom: 15%;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            font-size: 24px;
            line-height: 1.6;
            text-shadow: 0 0 10px rgba(0,0,0,1), 0 0 20px rgba(0,0,0,1);
            pointer-events: none;
            z-index: 100;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        #subtitle-container .char {
            display: inline-block;
            opacity: 0;
            transform: translateY(10px);
        }
    </style>
    <!-- CDN Imports -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r158/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="fade-overlay"></div>
    
    <div id="start-screen">
        <div id="start-label">нажмите, чтобы начать</div>
        <div id="loader">загрузка ресурсов...</div>
    </div>

    <div id="subtitle-container"></div>

    <!-- Import Map for Three.js addons -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/",
                "tone": "https://cdn.skypack.dev/tone"
            }
        }
    </script>

    <script type="module" src="main.js"></script>
</body>
</html>
